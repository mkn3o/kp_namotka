<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Геодезическая намотка ленты</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: monospace; }
    canvas { display: block; }
    #info {
      position: absolute; top: 50px; left: 10px;
      color: white; background: rgba(0,0,0,0.7);
      padding: 4px 10px; border-radius: 4px;
    }
    #layerInfo {
      position: absolute; top: 10px; left: 10px;
      color: black; background: rgba(255,255,255,0.9);
      padding: 4px 10px; border-radius: 4px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <canvas id="webgl"></canvas>
  <div id="layerInfo">Слоёв: 0</div>
  <div id="info">🖱 Перетаскивайте мышь для вращения камеры</div>

  <script src="https://cdn.jsdelivr.net/npm/gl-matrix@3.4.4/gl-matrix-min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dat.gui@0.7.9/build/dat.gui.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
